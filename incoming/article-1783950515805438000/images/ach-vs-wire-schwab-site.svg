<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="ACH 与 Wire 怎么选">
  <rect width="1400" height="900" fill="#f5f7fb"/>
  <circle cx="120" cy="-30" r="260" fill="#e9f1ff" opacity=".85"/>
  <circle cx="1310" cy="870" r="280" fill="#eff7ff" opacity=".9"/>
  <text x="72" y="94" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="46" font-weight="760" text-anchor="start">ACH 与 Wire 怎么选</text>
  <text x="72" y="140" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">一个偏美国本地低成本，一个偏跨境、大额和时间敏感。</text>
  <path d="M 72 174 H 1328" stroke="#d8e2f2" stroke-width="2"/>
  <rect x="82" y="230" width="570" height="520" rx="16" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><path d="M 82 230 H 652 V 304 H 82 Z" fill="#3478f6"/><text x="114" y="278" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="31" font-weight="760" text-anchor="start">ACH</text><text x="116" y="360" fill="#3478f6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="720" text-anchor="start">适用</text><text x="247" y="350" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">美国本地银行</text><text x="247" y="379" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">嘉信账户</text><text x="116" y="454" fill="#3478f6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="720" text-anchor="start">成本</text><text x="247" y="444" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">通常较低，适合</text><text x="247" y="473" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">反复使用</text><text x="116" y="548" fill="#3478f6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="720" text-anchor="start">时间</text><text x="247" y="538" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">工作日批量处理，</text><text x="247" y="567" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">可能有 hold</text><text x="116" y="642" fill="#3478f6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="720" text-anchor="start">注意</text><text x="247" y="632" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">账户验证、退回、</text><text x="247" y="661" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">同名匹配</text>
   <rect x="748" y="230" width="570" height="520" rx="16" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><path d="M 748 230 H 1318 V 304 H 748 Z" fill="#5f6fcf"/><text x="780" y="278" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="31" font-weight="760" text-anchor="start">Wire / 电汇</text><text x="782" y="360" fill="#5f6fcf" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="720" text-anchor="start">适用</text><text x="913" y="350" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">跨境美元、大额、</text><text x="913" y="379" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">时间敏感</text><text x="782" y="454" fill="#5f6fcf" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="720" text-anchor="start">成本</text><text x="913" y="444" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">银行与中转行</text><text x="913" y="473" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">可能扣费</text><text x="782" y="548" fill="#5f6fcf" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="720" text-anchor="start">时间</text><text x="913" y="538" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">本地 wire 常见当天，</text><text x="913" y="567" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">国际电汇预留工作日</text><text x="782" y="642" fill="#5f6fcf" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="720" text-anchor="start">注意</text><text x="913" y="632" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">字段、备注、</text><text x="913" y="661" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" text-anchor="start">合规审核</text>
</svg>