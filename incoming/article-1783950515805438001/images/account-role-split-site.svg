<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="三个账户角色不要混用">
  <rect width="1400" height="900" fill="#f5f7fb"/>
  <circle cx="120" cy="-30" r="260" fill="#e9f1ff" opacity=".85"/>
  <circle cx="1310" cy="870" r="280" fill="#eff7ff" opacity=".9"/>
  <text x="72" y="94" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="46" font-weight="760" text-anchor="start">三个账户角色不要混用</text>
  <text x="72" y="140" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">角色越清楚，资金路径和风控解释越容易。</text>
  <path d="M 72 174 H 1328" stroke="#d8e2f2" stroke-width="2"/>
  <rect x="95" y="240" width="360" height="440" rx="16" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="95" y="240" width="12" height="440" rx="6" fill="#5f6fcf"/><text x="127" y="310" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="760" text-anchor="start">Wise</text><text x="127" y="370" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">收本地付款</text><text x="127" y="408" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">换汇</text><text x="127" y="446" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">短期中转</text><text x="127" y="484" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">交易记录</text>
   <rect x="520" y="240" width="360" height="440" rx="16" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="520" y="240" width="12" height="440" rx="6" fill="#1f8992"/><text x="552" y="310" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="760" text-anchor="start">海外银行账户</text><text x="552" y="370" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">长期流水</text><text x="552" y="408" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">地址 / 资金证明</text><text x="552" y="446" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">本地支付网络</text><text x="552" y="484" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">券商同名入金</text>
   <rect x="945" y="240" width="360" height="440" rx="16" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="945" y="240" width="12" height="440" rx="6" fill="#4d8f63"/><text x="977" y="310" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="760" text-anchor="start">券商账户</text><text x="977" y="370" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">现金与证券</text><text x="977" y="408" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">交易和税表</text><text x="977" y="446" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">月结单</text><text x="977" y="484" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">转仓 / 出金</text>
   <rect x="245" y="755" width="910" height="58" rx="12" fill="#eaf1ff" stroke="#bcd1fb" stroke-width="2"/>
   <text x="700" y="793" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="620" text-anchor="middle">不要把券商当收款中转站，也不要把 Wise 当作传统银行存款账户</text>
</svg>