<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Wise 与海外银行卡资金路径">
  <rect width="1400" height="900" fill="#f5f7fb"/>
  <circle cx="120" cy="-30" r="260" fill="#e9f1ff" opacity=".85"/>
  <circle cx="1310" cy="870" r="280" fill="#eff7ff" opacity=".9"/>
  <text x="72" y="94" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="46" font-weight="760" text-anchor="start">Wise 与海外银行卡资金路径</text>
  <text x="72" y="140" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">Wise 做多币种工具，海外银行账户做底座，券商用于投资。</text>
  <path d="M 72 174 H 1328" stroke="#d8e2f2" stroke-width="2"/>
  <rect x="80" y="300" width="255" height="270" rx="16" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><path d="M 80 300 H 335 V 370 H 80 Z" fill="#3478f6"/><text x="104" y="346" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="720" text-anchor="start">收入 / 原始资金</text><text x="104" y="426" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">工资、经营、</text><text x="104" y="460" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">投资赎回、家庭支持</text>
   <path d="M 342 435 H 407" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 403 423 L 419 435 L 403 447 Z" fill="#8392a8"/>
   <rect x="425" y="300" width="255" height="270" rx="16" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><path d="M 425 300 H 680 V 370 H 425 Z" fill="#5f6fcf"/><text x="449" y="346" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="720" text-anchor="start">Wise</text><text x="449" y="426" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">收款详情、换汇、</text><text x="449" y="460" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">短期中转、交易记录</text>
   <path d="M 687 435 H 752" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 748 423 L 764 435 L 748 447 Z" fill="#8392a8"/>
   <rect x="770" y="300" width="255" height="270" rx="16" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><path d="M 770 300 H 1025 V 370 H 770 Z" fill="#1f8992"/><text x="794" y="346" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="720" text-anchor="start">海外银行账户</text><text x="794" y="426" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">长期留存、本地支付、</text><text x="794" y="460" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">同名入出金、账户证明</text>
   <path d="M 1032 435 H 1097" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 1093 423 L 1109 435 L 1093 447 Z" fill="#8392a8"/>
