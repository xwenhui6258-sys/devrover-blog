   <rect x="210" y="690" width="980" height="64" rx="12" fill="#eaf1ff" stroke="#bcd1fb" stroke-width="2"/>
   <text x="700" y="731" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="650" text-anchor="middle">角色清楚：Wise 做工具，银行做底座，券商只做投资账户</text>
</svg>