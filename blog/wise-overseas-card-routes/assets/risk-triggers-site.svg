<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Wise 与海外银行卡风控触发点">
  <rect width="1400" height="900" fill="#f5f7fb"/>
  <circle cx="120" cy="-30" r="260" fill="#e9f1ff" opacity=".85"/>
  <circle cx="1310" cy="870" r="280" fill="#eff7ff" opacity=".9"/>
  <text x="72" y="94" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="46" font-weight="760" text-anchor="start">Wise 与海外银行卡风控触发点</text>
  <text x="72" y="140" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">风控关注的是：你是谁、钱从哪里来、要去哪里、用途是什么。</text>
  <path d="M 72 174 H 1328" stroke="#d8e2f2" stroke-width="2"/>
  <rect x="80" y="230" width="575" height="120" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="80" y="230" width="10" height="120" rx="5" fill="#c85656"/><circle cx="134" cy="277" r="22" fill="#c85656"/><text x="134" y="285" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="760" text-anchor="middle">1</text><text x="174" y="276" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="720" text-anchor="start">大额突增</text><text x="174" y="316" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" text-anchor="start">刚开户就大额跨境流转</text>
   <rect x="745" y="230" width="575" height="120" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="745" y="230" width="10" height="120" rx="5" fill="#c9872a"/><circle cx="799" cy="277" r="22" fill="#c9872a"/><text x="799" y="285" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="760" text-anchor="middle">2</text><text x="839" y="276" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="720" text-anchor="start">第三方资金</text><text x="839" y="316" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" text-anchor="start">代收代付、多人共用</text>
   <rect x="80" y="390" width="575" height="120" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="80" y="390" width="10" height="120" rx="5" fill="#7a6491"/><circle cx="134" cy="437" r="22" fill="#7a6491"/><text x="134" y="445" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="760" text-anchor="middle">3</text><text x="174" y="436" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="720" text-anchor="start">用途不匹配</text><text x="174" y="476" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" text-anchor="start">个人账户收商业款</text>
   <rect x="745" y="390" width="575" height="120" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="745" y="390" width="10" height="120" rx="5" fill="#3478f6"/><circle cx="799" cy="437" r="22" fill="#3478f6"/><text x="799" y="445" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="760" text-anchor="middle">4</text><text x="839" y="436" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="720" text-anchor="start">券商入金</text><text x="839" y="476" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" text-anchor="start">目标券商不接受支付机构账户</text>
   <rect x="80" y="550" width="575" height="120" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="80" y="550" width="10" height="120" rx="5" fill="#1f8992"/><circle cx="134" cy="597" r="22" fill="#1f8992"/><text x="134" y="605" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="760" text-anchor="middle">5</text><text x="174" y="596" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="720" text-anchor="start">资料不一致</text><text x="174" y="636" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" text-anchor="start">姓名、地址、税务身份不一致</text>
   <rect x="745" y="550" width="575" height="120" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><rect x="745" y="550" width="10" height="120" rx="5" fill="#4d8f63"/><circle cx="799" cy="597" r="22" fill="#4d8f63"/><text x="799" y="605" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="760" text-anchor="middle">6</text><text x="839" y="596" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="720" text-anchor="start">受限行业</text><text x="839" y="636" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" text-anchor="start">加密货币、无牌金融服务等</text>
</svg>