<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Charles Schwab 入金路径">
  <rect width="1400" height="900" fill="#f5f7fb"/>
  <circle cx="120" cy="-30" r="260" fill="#e9f1ff" opacity=".85"/>
  <circle cx="1310" cy="870" r="280" fill="#eff7ff" opacity=".9"/>
  <text x="72" y="94" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="46" font-weight="760" text-anchor="start">Charles Schwab 入金路径</text>
  <text x="72" y="140" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="500" text-anchor="start">先分清 ACH、电汇、转仓与资金可用状态。</text>
  <path d="M 72 174 H 1328" stroke="#d8e2f2" stroke-width="2"/>
  <rect x="82" y="220" width="250" height="92" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><text x="108" y="276" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="650" text-anchor="start">美国银行</text><path d="M 340 266 H 482" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 478 254 L 494 266 L 478 278 Z" fill="#8392a8"/><rect x="500" y="220" width="390" height="92" rx="14" fill="#3478f6" stroke="#3478f6" stroke-width="2"/><text x="530" y="276" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="700" text-anchor="start">ACH</text><path d="M 900 266 H 1040" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 1036 254 L 1052 266 L 1036 278 Z" fill="#8392a8"/><rect x="1060" y="220" width="250" height="92" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><text x="1090" y="276" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="650" text-anchor="start">Schwab 账户</text><text x="504" y="342" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" text-anchor="start">低成本，适合反复入出金</text>
   <rect x="82" y="370" width="250" height="92" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><text x="108" y="426" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="650" text-anchor="start">境外银行</text><path d="M 340 416 H 482" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 478 404 L 494 416 L 478 428 Z" fill="#8392a8"/><rect x="500" y="370" width="390" height="92" rx="14" fill="#5f6fcf" stroke="#5f6fcf" stroke-width="2"/><text x="530" y="426" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="700" text-anchor="start">国际电汇 / SWIFT</text><path d="M 900 416 H 1040" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 1036 404 L 1052 416 L 1036 428 Z" fill="#8392a8"/><rect x="1060" y="370" width="250" height="92" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><text x="1090" y="426" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="650" text-anchor="start">Schwab 账户</text><text x="504" y="492" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" text-anchor="start">适合跨境美元与较大金额</text>
   <rect x="82" y="520" width="250" height="92" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><text x="108" y="576" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="650" text-anchor="start">美国银行</text><path d="M 340 566 H 482" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 478 554 L 494 566 L 478 578 Z" fill="#8392a8"/><rect x="500" y="520" width="390" height="92" rx="14" fill="#1f8992" stroke="#1f8992" stroke-width="2"/><text x="530" y="576" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="700" text-anchor="start">Domestic wire</text><path d="M 900 566 H 1040" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 1036 554 L 1052 566 L 1036 578 Z" fill="#8392a8"/><rect x="1060" y="520" width="250" height="92" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><text x="1090" y="576" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="650" text-anchor="start">Schwab 账户</text><text x="504" y="642" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" text-anchor="start">适合时间敏感的本地资金</text>
   <rect x="82" y="670" width="250" height="92" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><text x="108" y="726" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="650" text-anchor="start">原券商</text><path d="M 340 716 H 482" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 478 704 L 494 716 L 478 728 Z" fill="#8392a8"/><rect x="500" y="670" width="390" height="92" rx="14" fill="#4d8f63" stroke="#4d8f63" stroke-width="2"/><text x="530" y="726" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="700" text-anchor="start">ACAT / 转仓</text><path d="M 900 716 H 1040" fill="none" stroke="#8392a8" stroke-width="4" stroke-linecap="round"/><path d="M 1036 704 L 1052 716 L 1036 728 Z" fill="#8392a8"/><rect x="1060" y="670" width="250" height="92" rx="14" fill="#ffffff" stroke="#d8e2f2" stroke-width="2"/><text x="1090" y="726" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="650" text-anchor="start">Schwab 账户</text><text x="504" y="792" fill="#697386" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" text-anchor="start">转移持仓，不是现金入金</text>
   <rect x="255" y="802" width="890" height="58" rx="12" fill="#eaf1ff" stroke="#bcd1fb" stroke-width="2"/>
   <text x="700" y="840" fill="#172033" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="650" text-anchor="middle">关键：银行已汇出 ≠ 嘉信已入账 ≠ 可交易 ≠ 可转出</text>
</svg>